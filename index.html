<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Home</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --bg:#070b14;
      --card:rgba(15,18,28,.52);
      --card-hover:rgba(22,28,42,.72);
      --border:rgba(255,255,255,.07);
      --text:#f5f7fb;
      --muted:#98a2b3;
      --accent:#60a5fa;
      --shadow:0 10px 35px rgba(0,0,0,.35);
      --radius:20px;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    html,body{
      height:100%;
    }

    body{
      font-family:'Inter',system-ui,sans-serif;
      color:var(--text);
      overflow-x:hidden;
      background:var(--bg);
      position:relative;
    }

    /* BACKGROUND */

    body::before{
      content:'';
      position:fixed;
      inset:0;
      background:
        url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1920&q=80')
        center/cover no-repeat;
      animation:bgMove 40s ease-in-out infinite alternate;
      transform:scale(1);
      z-index:-3;
    }

    body::after{
      content:'';
      position:fixed;
      inset:0;
      background:
        radial-gradient(circle at top left, rgba(96,165,250,.12), transparent 30%),
        radial-gradient(circle at bottom right, rgba(59,130,246,.08), transparent 25%),
        rgba(3,6,11,.62);
      backdrop-filter:blur(2px);
      z-index:-2;
    }

    @keyframes bgMove{
      from{
        transform:scale(1);
      }
      to{
        transform:scale(1.08);
      }
    }

    .app{
      width:min(1180px,92%);
      margin:auto;
      padding:42px 0 60px;
    }

    /* HEADER */

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:20px;
      margin-bottom:28px;
      flex-wrap:wrap;
    }

    .hero h1{
      font-size:2rem;
      font-weight:700;
      letter-spacing:-1px;
      margin-bottom:8px;
    }

    .hero p{
      color:var(--muted);
      font-size:.95rem;
    }

    .meta{
      display:flex;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }

    .glass{
      background:var(--card);
      border:1px solid var(--border);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      box-shadow:var(--shadow);
    }

    .weather,
    .clock,
    .refresh{
      border-radius:14px;
      padding:.85rem 1rem;
      font-size:.88rem;
      color:#dbe4f0;
    }

    .refresh{
      cursor:pointer;
      transition:.25s;
      user-select:none;
    }

    .refresh:hover{
      background:var(--card-hover);
      transform:translateY(-1px);
    }

    /* TOP STORY */

    .top-story{
      padding:28px;
      border-radius:28px;
      margin-bottom:28px;
      position:relative;
      overflow:hidden;
    }

    .top-story::before{
      content:'TOP STORY';
      position:absolute;
      top:18px;
      right:20px;
      font-size:.7rem;
      letter-spacing:.18em;
      color:rgba(255,255,255,.35);
    }

    .top-source{
      color:var(--accent);
      font-size:.82rem;
      margin-bottom:14px;
      font-weight:600;
    }

    .top-title{
      font-size:1.9rem;
      line-height:1.15;
      font-weight:700;
      max-width:850px;
      margin-bottom:12px;
    }

    .top-link{
      text-decoration:none;
      color:var(--text);
    }

    .top-link:hover{
      opacity:.92;
    }

    .top-desc{
      color:var(--muted);
      line-height:1.5;
      max-width:850px;
      font-size:.96rem;
    }

    /* GRID */

    .grid{
      display:grid;
      grid-template-columns:
      repeat(auto-fit,minmax(250px,1fr));
      gap:18px;
    }

    .card{
      border-radius:22px;
      padding:20px;
      transition:.28s ease;
      position:relative;
      overflow:hidden;
      min-height:220px;
    }

    .card:hover{
      transform:translateY(-3px);
      background:var(--card-hover);
      border-color:rgba(96,165,250,.22);
      box-shadow:
        0 0 0 1px rgba(96,165,250,.15),
        0 10px 35px rgba(59,130,246,.08);
    }

    .card-header{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:18px;
    }

    .icon{
      width:42px;
      height:42px;
      border-radius:12px;
      display:grid;
      place-items:center;
      background:rgba(255,255,255,.06);
      font-size:1.2rem;
    }

    .card-title{
      font-weight:600;
      margin-bottom:3px;
    }

    .card-desc{
      color:var(--muted);
      font-size:.8rem;
    }

    /* HEADLINES */

    .headline{
      display:block;
      text-decoration:none;
      color:#eef2f7;
      margin-bottom:14px;
      line-height:1.38;
      font-size:.92rem;
      transition:.2s;
      opacity:.92;
    }

    .headline:hover{
      opacity:1;
      transform:translateX(2px);
      color:#fff;
    }

    .headline:first-child{
      font-weight:600;
      font-size:1rem;
      margin-bottom:18px;
    }

    /* SKELETON */

    .skeleton{
      height:14px;
      border-radius:999px;
      margin-bottom:14px;
      background:
      linear-gradient(
        90deg,
        rgba(255,255,255,.05),
        rgba(255,255,255,.12),
        rgba(255,255,255,.05)
      );
      background-size:200% 100%;
      animation:shimmer 1.3s infinite;
    }

    .skeleton:nth-child(2){
      width:88%;
    }

    .skeleton:nth-child(3){
      width:72%;
    }

    @keyframes shimmer{
      to{
        background-position:-200% 0;
      }
    }

    footer{
      margin-top:34px;
      text-align:center;
      color:var(--muted);
      font-size:.82rem;
    }

    @media(max-width:700px){

      .hero h1{
        font-size:1.5rem;
      }

      .top-title{
        font-size:1.35rem;
      }

      .top-story{
        padding:22px;
      }

      .card{
        min-height:auto;
      }

    }
  </style>
</head>
<body>

  <div class="app">

    <header class="topbar">

      <div class="hero">
        <h1 id="greeting">Buongiorno</h1>
        <p>Notizie selezionate. Nessun rumore.</p>
      </div>

      <div class="meta">
        <div class="weather glass" id="weather">
          Meteo...
        </div>

        <div class="clock glass" id="clock">
          --
        </div>

        <div class="refresh glass" onclick="loadAll()">
          Aggiorna
        </div>
      </div>

    </header>

    <!-- TOP STORY -->

    <section class="top-story glass">

      <div class="top-source" id="topSource">
        Caricamento...
      </div>

      <a id="topLink" class="top-link" target="_blank">
        <div class="top-title" id="topTitle">
          Recupero notizia principale...
        </div>
      </a>

      <div class="top-desc" id="topDesc"></div>

    </section>

    <!-- GRID -->

    <main class="grid" id="grid"></main>

    <footer>
      Dashboard personale minimal · GitHub Pages
    </footer>

  </div>

<script>

const RSS_API =
'https://api.rss2json.com/v1/api.json?rss_url=';

const sources = [

{
  name:'Il Post',
  url:'https://www.ilpost.it/feed/',
  icon:'📰',
  desc:'Attualità'
},

{
  name:'ANSA',
  url:'https://www.ansa.it/sito/notizie/ultime_notizie/ultime_notizie.rss',
  icon:'🌍',
  desc:'Italia'
},

{
  name:'Wired',
  url:'https://www.wired.it/feed/',
  icon:'💻',
  desc:'Tecnologia'
},

{
  name:'Focus',
  url:'https://www.focus.it/rss/scienza.xml',
  icon:'🔬',
  desc:'Scienza'
},

{
  name:'Ubitennis',
  url:'https://www.ubitennis.com/feed/',
  icon:'🎾',
  desc:'Sport'
},

{
  name:'Reuters',
  url:'https://feeds.reuters.com/reuters/worldNews',
  icon:'🌐',
  desc:'Mondo'
}

];

function greeting(){

  const h = new Date().getHours();

  if(h < 6) return 'Buona notte';
  if(h < 12) return 'Buongiorno';
  if(h < 18) return 'Buon pomeriggio';

  return 'Buonasera';
}

function updateClock(){

  const now = new Date();

  document.getElementById('clock').textContent =
    now.toLocaleTimeString('it-IT',{
      hour:'2-digit',
      minute:'2-digit'
    });

  document.getElementById('greeting').textContent =
    greeting();
}

async function weather(){

  try{

    const r = await fetch(
      'https://api.open-meteo.com/v1/forecast?latitude=45.4642&longitude=9.1900&current=temperature_2m'
    );

    const d = await r.json();

    document.getElementById('weather').textContent =
      `${Math.round(d.current.temperature_2m)}° · Milano`;

  }catch{

    document.getElementById('weather').textContent =
      'Meteo non disponibile';
  }
}

function skeleton(){

  return `
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  `;
}

async function fetchFeed(feed){

  const res = await fetch(
    RSS_API + encodeURIComponent(feed.url),
    {
      signal:AbortSignal.timeout(7000)
    }
  );

  const data = await res.json();

  if(data.status !== 'ok')
    throw new Error();

  return data.items.slice(0,4);
}

async function buildCards(){

  const grid = document.getElementById('grid');

  grid.innerHTML = '';

  sources.forEach((s,i)=>{

    const div = document.createElement('div');

    div.className = 'card glass';

    div.innerHTML = `

      <div class="card-header">

        <div class="icon">${s.icon}</div>

        <div>
          <div class="card-title">${s.name}</div>
          <div class="card-desc">${s.desc}</div>
        </div>

      </div>

      <div id="content-${i}">
        ${skeleton()}
      </div>

    `;

    grid.appendChild(div);

  });

  for(let i=0;i<sources.length;i++){

    const s = sources[i];
    const target =
    document.getElementById(`content-${i}`);

    try{

      const items = await fetchFeed(s);

      target.innerHTML = items.map((item,index)=>`

        <a
          class="headline"
          href="${item.link}"
          target="_blank"
          rel="noopener"
        >
          ${item.title}
        </a>

      `).join('');

      if(i === 0){

        topStory(items[0],s);

      }

    }catch{

      target.innerHTML = `
        <div style="
          color:var(--muted);
          font-size:.85rem;
          line-height:1.5;
        ">
          Feed momentaneamente non disponibile.
        </div>
      `;
    }
  }
}

function topStory(item,source){

  document.getElementById('topSource').textContent =
    source.name;

  document.getElementById('topTitle').textContent =
    item.title;

  document.getElementById('topLink').href =
    item.link;

  const clean =
    item.description
    ?.replace(/<[^>]*>/g,'')
    ?.slice(0,180);

  document.getElementById('topDesc').textContent =
    clean || 'Apri la notizia per leggere di più.';
}

function loadAll(){

  updateClock();

  weather();

  buildCards();
}

loadAll();

setInterval(updateClock,60000);

</script>

</body>
</html>
