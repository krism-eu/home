<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Dashboard notizie minimal: 8 fonti italiane. Zero ads, zero tracking.">
<title>Dashboard Notizie · Zero Tracking</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📰</text></svg>">
<style>
:root{
  --bg:#060912;
  --card:rgba(14, 18, 30, 0.65);
  --card-hover:rgba(24, 31, 48, 0.85);
  --border:rgba(255,255,255,0.06);
  --text:#f3f6fb;
  --muted:#9aa4b2;
  --accent:#60a5fa;
  --radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:Inter,system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background-color:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}

/* SFONDO PURO CSS - ZERO IMMAGINI */
body::before{
  content:'';
  position:fixed;
  inset:0;
  z-index:-2;
  background-color:var(--bg);
  background-image: 
    radial-gradient(at 0% 0%, rgba(96, 165, 250, 0.12) 0px, transparent 50%),
    radial-gradient(at 100% 0%, rgba(124, 58, 237, 0.08) 0px, transparent 50%),
    radial-gradient(at 100% 100%, rgba(14, 165, 233, 0.08) 0px, transparent 50%),
    radial-gradient(at 0% 100%, rgba(59, 130, 246, 0.05) 0px, transparent 50%);
}
body::after{
  content:'';
  position:fixed;
  inset:0;
  z-index:-1;
  pointer-events:none;
  background: radial-gradient(circle at 50% 0%, rgba(255,255,255,0.03), transparent 60%);
}

@media (prefers-reduced-motion: reduce){
  *{animation:none!important;transition:none!important;scroll-behavior:auto!important}
}

/* ALLARGATO LARGHEZZA MASSIMA */
.app{width:min(1300px,95%);margin:auto;padding:30px 0 44px}
.topbar{display:flex;justify-content:space-between;align-items:center;gap:18px;flex-wrap:wrap;margin-bottom:24px}
.hero h1{font-size:1.85rem;letter-spacing:-0.5px;margin-bottom:4px;font-weight:700}
.hero p{color:var(--muted);font-size:.88rem}
.meta{display:flex;gap:10px;flex-wrap:wrap}
.glass{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:var(--radius);
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
}
.weather,.clock,.refresh{padding:.75rem 1rem;font-size:.82rem;color:#e8edf4}
.refresh{cursor:pointer;transition:background .2s ease,transform .15s ease}
.refresh:hover{background:var(--card-hover)}
.refresh:active{transform:scale(.97)}

.search{margin-bottom:22px}
.search-box{
  width:100%;padding:1rem 1.2rem;border:none;outline:none;
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--radius);color:var(--text);font-size:.95rem;
  transition: border-color 0.2s ease;
}
.search-box:focus{border-color:rgba(96,165,250,0.3)}
.search-box::placeholder{color:var(--muted)}

.top-story{display:grid;grid-template-columns:1.2fr .8fr;gap:24px;overflow:hidden;margin-bottom:22px;padding:24px}
.top-content{display:flex;flex-direction:column;justify-content:center}
.top-source{color:var(--accent);font-size:.78rem;margin-bottom:12px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}
/* TITOLO PRINCIPALE LEGGERMENTE PIU GRANDE */
.top-title{font-size:1.55rem;line-height:1.15;font-weight:700;margin-bottom:14px}
.top-link{color:inherit;text-decoration:none;transition:opacity 0.2s}
.top-link:hover{opacity:.85}
.top-desc{color:var(--muted);font-size:.9rem;line-height:1.55}
.top-image{
  width:100%;height:240px;object-fit:cover;border-radius:12px;opacity:.9;
  background:rgba(255,255,255,0.03);transition:opacity .3s ease;
}

/* GRIGLIA A 3 COLONNE PER ALLARGARE LE SCHEDE */
.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:18px;
}
.card{padding:22px;min-height:180px;contain:content;transition:transform .2s ease,background .2s ease,border-color .2s ease,box-shadow .2s ease}
.card:hover{transform:translateY(-3px);background:var(--card-hover);border-color:rgba(96,165,250,.15);box-shadow:0 12px 40px rgba(0,0,0,.25)}
.card-header{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.icon{width:42px;height:42px;display:grid;place-items:center;border-radius:12px;background:rgba(255,255,255,.04);font-size:1.1rem}
.card-title{font-weight:700;font-size:.95rem}
.card-desc{color:var(--muted);font-size:.76rem;margin-top:2px}

/* TESTI LEGGERMENTE PIU GRANDI E LEGGIBILI */
.headline-main{display:block;color:#fff;text-decoration:none;font-size:.98rem;font-weight:600;line-height:1.5;margin-bottom:14px;transition:color 0.2s}
.headline-main:hover{color:var(--accent)}
.headline-small{display:block;color:#d4dbe5;text-decoration:none;font-size:.88rem;line-height:1.5;margin-bottom:10px;opacity:.85;transition:color 0.2s}
.headline-small:hover{color:#fff;opacity:1}

.skeleton{height:12px;border-radius:99px;margin-bottom:14px;background:linear-gradient(90deg,rgba(255,255,255,.03),rgba(255,255,255,.08),rgba(255,255,255,.03));background-size:200% 100%;animation:shimmer 1.5s infinite}
@keyframes shimmer{to{background-position:-200% 0}}

footer{margin-top:36px;text-align:center;color:var(--muted);font-size:.75rem;opacity:.7}

/* RESPONSIVE */
@media(max-width:1100px){.grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:860px){.top-story{grid-template-columns:1fr}.top-image{height:200px}}
@media(max-width:640px){.hero h1{font-size:1.4rem}.grid{grid-template-columns:1fr}}

a:focus-visible,button:focus-visible,[tabindex]:focus-visible{
  outline:2px solid var(--accent);
  outline-offset:3px;
  border-radius:6px;
}
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="hero">
      <h1 id="greeting" aria-live="polite">Buongiorno</h1>
      <p>8 fonti italiane · Zero tracking</p>
    </div>
    <div class="meta">
      <div class="weather glass" id="weather" aria-live="polite" aria-label="Meteo">⛅ --°</div>
      <div class="clock glass" id="clock" aria-label="Ora corrente">--:--</div>
      <div class="refresh glass" onclick="loadAll()" role="button" tabindex="0" aria-label="Aggiorna notizie">↻ Aggiorna</div>
    </div>
  </header>

  <section class="search">
    <form action="https://duckduckgo.com/" method="GET" target="_blank" rel="noopener noreferrer">
      <input class="search-box" type="text" name="q" placeholder="Cerca con DuckDuckGo..." autocomplete="off" aria-label="Cerca sul web">
    </form>
  </section>

  <section class="top-story glass" id="topStory" style="display:none">
    <div class="top-content">
      <div class="top-source" id="topSource"></div>
      <a id="topLink" class="top-link" target="_blank" rel="noopener noreferrer">
        <div class="top-title" id="topTitle" aria-live="polite"></div>
      </a>
      <div class="top-desc" id="topDesc"></div>
    </div>
    <img id="topImage" class="top-image" alt="Immagine notizia principale" loading="lazy" onerror="this.style.display='none'">
  </section>

  <main class="grid" id="grid" aria-label="Fonti notizie"></main>
  
  <footer>Dashboard Locale · Nessun cookie · Nessun tracciamento</footer>
</div>

<script>
/* ================= CONFIGURAZIONE ================= */
const RSS_API = 'https://api.rss2json.com/v1/api.json?rss_url=';
const CACHE_HOURS = 4;
const REFRESH_MS = 1000 * 60 * 60;

const sources = [
  { name:'ANSA', url:'https://www.ansa.it/sito/notizie/topnews/topnews_rss.xml', icon:'📰', desc:'Ultime notizie' },
  { name:'PerugiaToday', url:'https://www.perugiatoday.it/rss', icon:'🏛️', desc:'Perugia e Umbria' },
  { name:'Repubblica Tech', url:'https://www.repubblica.it/rss/tecnologia/rss2.0.xml', icon:'💻', desc:'Tecnologia' },
  { name:"Tom's Hardware", url:'https://www.tomshw.it/feed/', icon:'📱', desc:'Hardware e Tech' },
  { name:'Ubitennis', url:'https://www.ubitennis.com/feed/', icon:'🎾', desc:'Tennis' },
  { name:'Innovazione AI', url:'https://www.zdnet.it/feed/', icon:'🤖', desc:'AI e Innovazione' },
  /* SOSTITUITO IL SOLE 24 ORE CON RAINIEWS (FEED PIU STABILE E AFFIDABILE) */
  { name:'Rainews', url:'https://www.rainews.it/rss/rainews.xml', icon:'🌍', desc:'Cronaca e Mondo' },
  { name:'Corriere Salute', url:'https://www.corriere.it/rss/salute.xml', icon:'❤️', desc:'Salute e benessere' }
];

/* ================= UTILITIES ================= */
function greeting(){
  const h = new Date().getHours();
  if(h < 6) return 'Buona notte';
  if(h < 12) return 'Buongiorno';
  if(h < 18) return 'Buon pomeriggio';
  return 'Buonasera';
}

function updateClock(){
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
  document.getElementById('greeting').textContent = greeting();
}

/* ================= METEO ================= */
async function loadWeather(){
  try{
    const r = await fetch('https://api.open-meteo.com/v1/forecast?latitude=43.1107&longitude=12.3908&current=temperature_2m,weather_code&timezone=Europe/Rome');
    const d = await r.json();
    const temp = Math.round(d.current.temperature_2m);
    const code = d.current.weather_code;
    const map = {0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',48:'🌫️',51:'🌦️',61:'🌧️',71:'❄️',80:'🌧️',95:'⛈️'};
    document.getElementById('weather').innerHTML = `<span>${map[code]||'⛅'}</span> <span>${temp}° · Perugia</span>`;
  }catch{
    document.getElementById('weather').innerHTML = `⛅ N/D`;
  }
}

/* ================= CACHE ================= */
function cacheKey(url){ return `news_${btoa(url)}`; }
function getCache(url){
  try{
    const raw = localStorage.getItem(cacheKey(url));
    if(!raw) return null;
    const {items,ts} = JSON.parse(raw);
    if(Date.now() - ts < CACHE_HOURS * 3600 * 1000) return items;
    localStorage.removeItem(cacheKey(url));
  }catch(e){}
  return null;
}
function setCache(url, items){
  try{ localStorage.setItem(cacheKey(url), JSON.stringify({items, ts: Date.now()})); }catch(e){}
}

/* ================= SKELETON ================= */
function skeleton(){ return `<div class="skeleton" style="width:85%"></div><div class="skeleton" style="width:95%"></div><div class="skeleton" style="width:70%"></div>`; }

/* ================= FETCH ================= */
async function fetchFeed(url){
  const cached = getCache(url);
  if(cached) return cached;
  
  try{
    const res = await fetch(RSS_API + encodeURIComponent(url), {signal: AbortSignal.timeout(8000)});
    const data = await res.json();
    if(data.status !== 'ok' || !data.items?.length) throw new Error('Risposta non valida');
    const items = data.items.slice(0,3);
    setCache(url, items);
    return items;
  }catch(e){
    console.warn(`Feed fallito: ${url}`, e);
    throw e;
  }
}

/* ================= TOP STORY ================= */
function setTopStory(item, source){
  document.getElementById('topStory').style.display = 'grid';
  document.getElementById('topSource').textContent = source.name;
  document.getElementById('topTitle').textContent = item.title;
  document.getElementById('topLink').href = item.link;
  const clean = item.description?.replace(/<[^>]*>/g,'')?.slice(0,200);
  document.getElementById('topDesc').textContent = clean || '';
  
  const img = item.thumbnail || item.enclosure?.link;
  const imgEl = document.getElementById('topImage');
  if(img){
    imgEl.src = img;
    imgEl.style.display = 'block';
  } else {
    imgEl.style.display = 'none';
  }
}

/* ================= CARDS ================= */
async function buildCards(){
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  
  sources.forEach((s,i)=>{
    const card = document.createElement('div');
    card.className = 'card glass';
    card.innerHTML = `
      <div class="card-header">
        <div class="icon">${s.icon}</div>
        <div><div class="card-title">${s.name}</div><div class="card-desc">${s.desc}</div></div>
      </div>
      <div id="content-${i}">${skeleton()}</div>
    `;
    grid.appendChild(card);
  });
  
  const results = await Promise.allSettled(sources.map(s => fetchFeed(s.url)));
  let topCandidates = [];
  
  results.forEach((result,i)=>{
    const target = document.getElementById(`content-${i}`);
    if(result.status !== 'fulfilled'){
      target.innerHTML = `<div style="color:var(--muted);font-size:.8rem;font-style:italic">Feed non disponibile</div>`;
      return;
    }
    const items = result.value;
    const [first,...rest] = items;
    target.innerHTML = `
      <a class="headline-main" href="${first.link}" target="_blank" rel="noopener noreferrer">${first.title}</a>
      ${rest.map(it => `<a class="headline-small" href="${it.link}" target="_blank" rel="noopener noreferrer">${it.title}</a>`).join('')}
    `;
    topCandidates.push({item:first, source:sources[i]});
  });
  
  if(topCandidates.length){
    topCandidates.sort((a,b) => {
      const da = a.item.pubDate ? new Date(a.item.pubDate).getTime() : 0;
      const db = b.item.pubDate ? new Date(b.item.pubDate).getTime() : 0;
      return db - da;
    });
    setTopStory(topCandidates[0].item, topCandidates[0].source);
  }
}

/* ================= INIT ================= */
function loadAll(){
  updateClock();
  loadWeather();
  buildCards();
}

document.addEventListener('DOMContentLoaded', ()=>{
  loadAll();
  setInterval(updateClock, 30000);
  setInterval(buildCards, REFRESH_MS);
});

document.querySelector('.refresh')?.addEventListener('keydown', e=>{
  if(e.key==='Enter'||e.key===' '){ e.preventDefault(); loadAll(); }
});
</script>
</body>
</html>
