<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dashboard notizie minimal: 8 fonti italiane. Zero ads, zero tracking.">
  <title>Dashboard Notizie · Zero Tracking</title>
  <!-- Favicon inline (zero richieste esterne) -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📰</text></svg>">

  <style>
    /* ===== RESET & VARIABLES ===== */
    :root {
      --bg: #060912;
      --card: rgba(15, 20, 32, 0.72);
      --card-hover: rgba(24, 31, 48, 0.92);
      --border: rgba(255, 255, 255, 0.05);
      --text: #f3f6fb;
      --muted: #9aa4b2;
      --accent: #60a5fa;
      --radius: 18px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    /* ===== BACKGROUND (FALLBACK PERFORMANTE) ===== */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        linear-gradient(rgba(0, 0, 0, 0.45), rgba(0, 0, 0, 0.58)),
        url('https://images.unsplash.com/photo-1472214103451-9374bd1c798e?ixlib=rb-4.0.3&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D&auto=format&fit=crop&w=2070&q=80')
        center/cover no-repeat;
      z-index: -2;
      will-change: transform;
    }

    /* ===== LAYOUT ===== */
    .app {
      max-width: 1420px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .hero h1 {
      font-size: clamp(1.5rem, 4vw, 1.9rem);
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.25rem;
    }

    .hero p {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .meta {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    /* ===== GLASS EFFECT (CON FALLBACK) ===== */
    .glass {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    /* Fallback per browser che non supportano backdrop-filter */
    @supports not (backdrop-filter: blur(1px)) {
      .glass {
        background: rgba(15, 20, 32, 0.9);
      }
    }

    /* ===== COMPONENTI ===== */
    .weather, .clock, .refresh {
      padding: 0.6rem 0.8rem;
      font-size: 0.85rem;
      color: #e8edf4;
      cursor: default;
    }

    .refresh {
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .refresh:hover {
      background: var(--card-hover);
    }

    .refresh:active {
      transform: scale(0.98);
    }

    .search-box {
      width: 100%;
      padding: 0.8rem 1rem;
      border: none;
      outline: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    .search-box::placeholder {
      color: var(--muted);
    }

    /* ===== TOP STORY ===== */
    .top-story {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
      padding: 1.5rem;
    }

    @media (max-width: 860px) {
      .top-story {
        grid-template-columns: 1fr;
      }
    }

    .top-content {
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .top-source {
      color: var(--accent);
      font-size: 0.8rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .top-title {
      font-size: clamp(1.2rem, 3vw, 1.55rem);
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 0.75rem;
    }

    .top-link {
      color: inherit;
      text-decoration: none;
      transition: opacity 0.2s ease;
    }

    .top-link:hover {
      opacity: 0.85;
    }

    .top-desc {
      color: var(--muted);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    .top-image {
      width: 100%;
      height: 230px;
      object-fit: cover;
      border-radius: 12px;
      background: #111;
      opacity: 0.9;
    }

    @media (max-width: 860px) {
      .top-image {
        height: 200px;
      }
    }

    /* ===== GRID NOTIZIE ===== */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
    }

    .card {
      padding: 1.2rem;
      min-height: 170px;
      transition: all 0.25s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      background: var(--card-hover);
      border-color: rgba(96, 165, 250, 0.18);
      box-shadow: 0 0 0 1px rgba(96, 165, 250, 0.05), 0 8px 25px rgba(0, 0, 0, 0.2);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .icon {
      width: 40px;
      height: 40px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.04);
      font-size: 1.1rem;
    }

    .card-title {
      font-weight: 600;
      font-size: 1rem;
    }

    .card-desc {
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 0.2rem;
    }

    .headline-main {
      display: block;
      color: #fff;
