<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Home</title>

<style>

:root{
  --bg:#060912;
  --card:rgba(14,18,28,.55);
  --card-hover:rgba(20,26,40,.82);
  --border:rgba(255,255,255,.06);
  --text:#f3f6fb;
  --muted:#98a2b3;
  --accent:#60a5fa;
  --radius:22px;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:
    Inter,
    ui-sans-serif,
    system-ui,
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    sans-serif;

  min-height:100vh;
  color:var(--text);
  overflow-x:hidden;
  background:#050811;
}

/* BACKGROUND */

body::before{
  content:'';
  position:fixed;
  inset:0;
  background:
    url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1920&q=80')
    center/cover no-repeat;
  transform:scale(1);
  animation:bgMove 40s ease-in-out infinite alternate;
  z-index:-3;
}

body::after{
  content:'';
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at top left, rgba(96,165,250,.12), transparent 30%),
    rgba(0,0,0,.55);
  backdrop-filter:blur(4px);
  z-index:-2;
}

@keyframes bgMove{
  from{
    transform:scale(1);
  }
  to{
    transform:scale(1.06);
  }
}

.app{
  width:min(1380px,94%);
  margin:auto;
  padding:34px 0 42px;
}

/* TOPBAR */

.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:18px;
  flex-wrap:wrap;
  margin-bottom:20px;
}

.hero h1{
  font-size:1.9rem;
  letter-spacing:-1px;
  margin-bottom:5px;
}

.hero p{
  color:var(--muted);
  font-size:.92rem;
}

.meta{
  display:flex;
  gap:10px;
  flex-wrap:wrap;
}

.glass{
  background:var(--card);
  border:1px solid var(--border);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);
  border-radius:16px;
}

.weather,
.clock,
.refresh{
  padding:.82rem 1rem;
  font-size:.85rem;
  color:#e5e7eb;
}

.refresh{
  cursor:pointer;
  transition:.25s;
}

.refresh:hover{
  background:var(--card-hover);
}

/* WEATHER WIDGET */

.weather{
  display:flex;
  align-items:center;
  gap:10px;
}

.weather-icon{
  font-size:1rem;
}

/* TOP STORY */

.top-story{
  padding:24px 28px;
  margin-bottom:18px;
  position:relative;
  overflow:hidden;
}

.top-story::before{
  content:'TOP STORY';
  position:absolute;
  top:18px;
  right:20px;
  font-size:.7rem;
  letter-spacing:.18em;
  color:rgba(255,255,255,.28);
}

.top-source{
  color:var(--accent);
  font-size:.8rem;
  margin-bottom:10px;
  font-weight:600;
}

.top-title{
  font-size:1.5rem;
  line-height:1.15;
  font-weight:700;
  margin-bottom:10px;
  max-width:950px;
}

.top-link{
  color:inherit;
  text-decoration:none;
}

.top-link:hover{
  opacity:.92;
}

.top-desc{
  color:var(--muted);
  line-height:1.45;
  max-width:850px;
  font-size:.92rem;
}

/* GRID */

.grid{
  display:grid;
  grid-template-columns:
    repeat(auto-fit,minmax(300px,1fr));
  gap:16px;
}

.card{
  padding:18px;
  min-height:165px;
  transition:.25s ease;
}

.card:hover{
  transform:translateY(-2px);
  background:var(--card-hover);
  border-color:rgba(96,165,250,.2);
  box-shadow:
    0 0 0 1px rgba(96,165,250,.08),
    0 8px 28px rgba(59,130,246,.08);
}

.card-header{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:14px;
}

.icon{
  width:40px;
  height:40px;
  border-radius:12px;
  background:rgba(255,255,255,.05);
  display:grid;
  place-items:center;
  font-size:1.1rem;
}

.card-title{
  font-weight:600;
}

.card-desc{
  color:var(--muted);
  font-size:.78rem;
  margin-top:2px;
}

/* HEADLINES */

.headline-main{
  display:block;
  text-decoration:none;
  color:#fff;
  font-size:.97rem;
  font-weight:600;
  line-height:1.4;
  margin-bottom:12px;
}

.headline-main:hover{
  opacity:.9;
}

.headline-small{
  display:block;
  text-decoration:none;
  color:#cfd8e3;
  font-size:.84rem;
  line-height:1.45;
  margin-bottom:10px;
  opacity:.88;
}

.headline-small:hover{
  color:#fff;
}

/* SKELETON */

.skeleton{
  height:13px;
  border-radius:999px;
  margin-bottom:12px;
  background:
    linear-gradient(
      90deg,
      rgba(255,255,255,.05),
      rgba(255,255,255,.12),
      rgba(255,255,255,.05)
    );

  background-size:200% 100%;
  animation:shimmer 1.2s infinite;
}

@keyframes shimmer{
  to{
    background-position:-200% 0;
  }
}

footer{
  margin-top:28px;
  text-align:center;
  color:var(--muted);
  font-size:.8rem;
}

@media(max-width:720px){

  .hero h1{
    font-size:1.45rem;
  }

  .top-title{
    font-size:1.2rem;
  }

  .top-story{
    padding:22px;
  }

}

</style>
</head>

<body>

<div class="app">

  <header class="topbar">

    <div class="hero">
      <h1 id="greeting">Buongiorno</h1>
      <p>Notizie selezionate. Nessun rumore.</p>
    </div>

    <div class="meta">

      <div class="weather glass" id="weather">
        <span class="weather-icon">⛅</span>
        <span>Meteo...</span>
      </div>

      <div class="clock glass" id="clock">
        --
      </div>

      <div class="refresh glass" onclick="loadAll()">
        Aggiorna
      </div>

    </div>

  </header>

  <!-- TOP STORY -->

  <section class="top-story glass">

    <div class="top-source" id="topSource">
      Caricamento...
    </div>

    <a id="topLink" class="top-link" target="_blank">
      <div class="top-title" id="topTitle">
        Recupero notizia principale...
      </div>
    </a>

    <div class="top-desc" id="topDesc"></div>

  </section>

  <!-- GRID -->

  <main class="grid" id="grid"></main>

  <footer>
    Dashboard minimal · GitHub Pages
  </footer>

</div>

<script>

/*
NESSUNA DIPENDENZA ESTERNA
NO GOOGLE
SOLO:
- Open Meteo
- RSS2JSON
*/

const RSS_API =
'https://api.rss2json.com/v1/api.json?rss_url=';

/*
FEED ITALIANI ABBASTANZA STABILI
*/

const sources = [

{
  name:'ANSA',
  url:'https://www.ansa.it/sito/notizie/topnews/topnews_rss.xml',
  icon:'📰',
  desc:'Ultime notizie'
},

{
  name:'Sky TG24',
  url:'https://tg24.sky.it/rss/tg24',
  icon:'🌍',
  desc:'Attualità'
},

{
  name:'Wired Italia',
  url:'https://www.wired.it/feed/rss',
  icon:'💻',
  desc:'Tecnologia'
},

{
  name:'Focus',
  url:'https://www.focus.it/rss/scienza.xml',
  icon:'🔬',
  desc:'Scienza'
},

{
  name:'HDblog',
  url:'https://www.hdblog.it/feed/',
  icon:'📱',
  desc:'Tech'
},

{
  name:'Ubitennis',
  url:'https://www.ubitennis.com/feed/',
  icon:'🎾',
  desc:'Tennis'
}

];

function greeting(){

  const h = new Date().getHours();

  if(h < 6) return 'Buona notte';
  if(h < 12) return 'Buongiorno';
  if(h < 18) return 'Buon pomeriggio';

  return 'Buonasera';
}

function updateClock(){

  const now = new Date();

  document.getElementById('clock').textContent =
    now.toLocaleTimeString('it-IT',{
      hour:'2-digit',
      minute:'2-digit'
    });

  document.getElementById('greeting').textContent =
    greeting();
}

/* METEO */

async function weather(){

  try{

    const r = await fetch(
      'https://api.open-meteo.com/v1/forecast?latitude=45.4642&longitude=9.1900&current=temperature_2m,weather_code'
    );

    const d = await r.json();

    const temp =
      Math.round(d.current.temperature_2m);

    const code =
      d.current.weather_code;

    const weatherMap = {
      0:'☀️',
      1:'🌤️',
      2:'⛅',
      3:'☁️',
      45:'🌫️',
      48:'🌫️',
      51:'🌦️',
      61:'🌧️',
      71:'❄️',
      95:'⛈️'
    };

    document.getElementById('weather').innerHTML = `
      <span class="weather-icon">
        ${weatherMap[code] || '⛅'}
      </span>

      <span>
        ${temp}° · Milano
      </span>
    `;

  }catch{

    document.getElementById('weather').innerHTML = `
      <span class="weather-icon">⛅</span>
      <span>Meteo non disponibile</span>
    `;
  }
}

/* SKELETON */

function skeleton(){

  return `
    <div class="skeleton"></div>
    <div class="skeleton"></div>
    <div class="skeleton"></div>
  `;
}

/* FEED */

async function fetchFeed(feed){

  const res = await fetch(
    RSS_API + encodeURIComponent(feed.url),
    {
      signal:AbortSignal.timeout(7000)
    }
  );

  const data = await res.json();

  if(data.status !== 'ok' || !data.items?.length){
    throw new Error();
  }

  return data.items.slice(0,3);
}

/* CARDS */

async function buildCards(){

  const grid =
    document.getElementById('grid');

  grid.innerHTML = '';

  sources.forEach((s,i)=>{

    const card =
      document.createElement('div');

    card.className =
      'card glass';

    card.innerHTML = `

      <div class="card-header">

        <div class="icon">${s.icon}</div>

        <div>
          <div class="card-title">${s.name}</div>
          <div class="card-desc">${s.desc}</div>
        </div>

      </div>

      <div id="content-${i}">
        ${skeleton()}
      </div>

    `;

    grid.appendChild(card);

  });

  for(let i=0;i<sources.length;i++){

    const s = sources[i];

    const target =
      document.getElementById(`content-${i}`);

    try{

      const items =
        await fetchFeed(s);

      const first = items[0];

      const rest =
        items.slice(1);

      target.innerHTML = `

        <a
          class="headline-main"
          href="${first.link}"
          target="_blank"
          rel="noopener"
        >
          ${first.title}
        </a>

        ${rest.map(item => `

          <a
            class="headline-small"
            href="${item.link}"
            target="_blank"
            rel="noopener"
          >
            ${item.title}
          </a>

        `).join('')}

      `;

      if(i === 0){

        topStory(first,s);

      }

    }catch{

      target.innerHTML = `
        <div style="
          color:var(--muted);
          font-size:.84rem;
          line-height:1.5;
        ">
          Feed non disponibile.
        </div>
      `;
    }
  }
}

/* TOP STORY */

function topStory(item,source){

  document.getElementById('topSource').textContent =
    source.name;

  document.getElementById('topTitle').textContent =
    item.title;

  document.getElementById('topLink').href =
    item.link;

  const clean =
    item.description
    ?.replace(/<[^>]*>/g,'')
    ?.slice(0,160);

  document.getElementById('topDesc').textContent =
    clean || 'Apri la notizia per leggere di più.';
}

/* LOAD */

function loadAll(){

  updateClock();

  weather();

  buildCards();
}

loadAll();

setInterval(updateClock,60000);

</script>

</body>
</html>
