<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Mia Home</title>
  <style>
    :root {
      --bg: #0b0f19;
      --card: rgba(255,255,255,0.06);
      --card-hover: rgba(255,255,255,0.12);
      --text: #f3f4f6;
      --muted: #9ca3af;
      --accent: #3b82f6;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: var(--bg) url('https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=1920&q=80') center/cover fixed;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: -1; }
    .container {
      max-width: 1100px; width: 100%;
      background: rgba(15,15,20,0.6);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: 0 12px 35px rgba(0,0,0,0.5);
    }
    header { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 1rem; margin-bottom: 1.5rem; }
    h1 { font-size: 1.7rem; font-weight: 600; letter-spacing: -0.5px; }
    .meta { display: flex; gap: 1rem; align-items: center; color: var(--muted); font-size: 0.85rem; }
    .weather { background: var(--card); padding: 0.5rem 0.9rem; border-radius: 10px; display: flex; align-items: center; gap: 0.5rem; border: 1px solid rgba(255,255,255,0.08); }
    .refresh-btn {
      background: var(--accent); color: #fff; border: none; padding: 0.4rem 0.8rem;
      border-radius: 8px; cursor: pointer; font-size: 0.8rem; transition: 0.2s;
    }
    .refresh-btn:hover { opacity: 0.85; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1rem; }
    .card {
      background: var(--card); border-radius: 14px; padding: 1rem;
      text-decoration: none; color: var(--text); border: 1px solid rgba(255,255,255,0.06);
      transition: all 0.25s ease; display: flex; flex-direction: column; gap: 0.6rem;
    }
    .card:hover { background: var(--card-hover); transform: translateY(-2px); border-color: var(--accent); }
    .card-header { display: flex; align-items: center; gap: 0.7rem; }
    .icon { font-size: 1.4rem; }
    .card-title { font-size: 1rem; font-weight: 600; }
    .card-desc { font-size: 0.75rem; color: var(--muted); margin-top: 0.1rem; }
    .headlines { list-style: none; display: flex; flex-direction: column; gap: 0.4rem; margin-top: 0.2rem; }
    .headlines li { font-size: 0.82rem; color: #e5e7eb; padding-left: 0.7rem; position: relative; line-height: 1.35; }
    .headlines li::before { content: "›"; position: absolute; left: 0; color: var(--accent); font-weight: 700; }
    .headlines li.loaded { animation: fadeSlide 0.3s ease forwards; opacity: 0; transform: translateY(4px); }
    @keyframes fadeSlide { to { opacity: 1; transform: translateY(0); } }
    .loading { color: var(--muted); font-size: 0.75rem; font-style: italic; }
    footer { margin-top: 1.5rem; text-align: center; color: var(--muted); font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 1rem; }
    @media (max-width: 600px) {
      .container { padding: 1.2rem; }
      h1 { font-size: 1.3rem; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="container">
    <header>
      <div>
        <h1 id="greeting">👋 Ciao</h1>
        <p class="card-desc">Notizie, meteo e link. Zero distrazioni.</p>
      </div>
      <div class="meta">
        <div id="weather" class="weather">🌡️ Meteo...</div>
        <button class="refresh-btn" onclick="loadAll()">🔄 Aggiorna</button>
      </div>
    </header>

    <div class="grid" id="news-grid"></div>
    <footer id="clock"></footer>
  </div>

  <script>
    // --- FONTI (8 schede) ---
    const sources = [
      { name: "Il Post", url: "https://www.ilpost.it/feed/", icon: "📰", desc: "Attualità" },
      { name: "ANSA", url: "https://www.ansa.it/sito/notizie/ultime_notizie/ultime_notizie.rss", icon: "🌍", desc: "Cronaca" },
      { name: "Wired IT", url: "https://www.wired.it/feed/", icon: "💻", desc: "Tech" },
      { name: "Ubitennis", url: "https://www.ubitennis.com/feed/", icon: "🎾", desc: "Tennis" },
      { name: "PerugiaToday", url: "https://www.perugiatoday.it/feed/", icon: "🏛️", desc: "Locale" },
      { name: "Corriere Salute", url: "https://www.corriere.it/rss/salute.xml", icon: "❤️", desc: "Salute" },
      { name: "Repubblica Tech", url: "https://www.repubblica.it/rss/tecnologia/rss2.0.xml", icon: "🔌", desc: "Innovazione" },
      { name: "Focus Scienza", url: "https://www.focus.it/rss/scienza.xml", icon: "🔬", desc: "Scienza" }
    ];

    // Bridge CORS stabile e gratuito per RSS
    const RSS_BRIDGE = "https://api.rss2json.com/v1/api.json?rss_url=";

    function buildCards() {
      const grid = document.getElementById('news-grid');
      grid.innerHTML = '';
      sources.forEach((src, i) => {
        const cleanUrl = src.url.replace(/\/(feed|rss)(\.xml)?\/?$/, '');
        const card = document.createElement('a');
        card.href = cleanUrl; card.target = "_blank"; card.rel = "noopener";
        card.className = "card"; card.id = `card-${i}`;
        card.innerHTML = `
          <div class="card-header">
            <span class="icon">${src.icon}</span>
            <div><div class="card-title">${src.name}</div><div class="card-desc">${src.desc}</div></div>
          </div>
          <ul class="headlines" id="hl-${i}"><li class="loading">⏳ Caricamento...</li></ul>
        `;
        grid.appendChild(card);
        fetchFeed(src.url, `hl-${i}`);
      });
    }

    async function fetchFeed(rssUrl, containerId) {
      const ul = document.getElementById(containerId);
      try {
        const res = await fetch(RSS_BRIDGE + encodeURIComponent(rssUrl), { signal: AbortSignal.timeout(6000) });
        const data = await res.json();
        if (data.status !== 'ok' || !data.items?.length) throw new Error('No data');
        ul.innerHTML = data.items.slice(0, 3).map((item, idx) => 
          `<li class="loaded" style="animation-delay:${idx*80}ms">${item.title}</li>`
        ).join('');
      } catch {
        ul.innerHTML = `<li style="color:var(--muted)">⚠️ Feed temporaneamente non raggiungibile</li>`;
      }
    }

    async function loadWeather() {
      try {
        const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=43.1107&longitude=12.3908&current=temperature_2m,weather_code&timezone=Europe/Rome");
        const d = await res.json();
        const w = {0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",51:"🌦️",61:"🌧️",71:"❄️",95:"⛈️"};
        document.getElementById("weather").innerHTML = `${w[d.current.weather_code]||"🌤️"} ${Math.round(d.current.temperature_2m)}°C Perugia`;
      } catch { document.getElementById("weather").textContent = "🌡️ Meteo non disp."; }
    }

    function updateTime() {
      const now = new Date();
      const h = now.getHours();
      document.getElementById('greeting').textContent = 
        h < 6 ? '🌙 Notte' : h < 12 ? '☀️ Mattina' : h < 18 ? '🌤️ Pomeriggio' : '🌅 Sera';
      document.getElementById('clock').textContent = `Ultimo agg: ${now.toLocaleTimeString('it-IT', {hour:'2-digit', minute:'2-digit'})} • ${now.toLocaleDateString('it-IT')}`;
    }

    function loadAll() {
      buildCards();
      loadWeather();
      updateTime();
    }

    // Avvio
    loadAll();
    setInterval(updateTime, 60000);
  </script>
</body>
</html>
