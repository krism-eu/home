<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>La Mia Home</title>
  <style>
    :root {
      --bg-overlay: rgba(15, 15, 15, 0.65);
      --card-bg: rgba(255, 255, 255, 0.06);
      --card-hover: rgba(255, 255, 255, 0.12);
      --text: #f2f2f2;
      --muted: #9ca3af;
      --accent: #60a5fa;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #0f172a url('https://images.unsplash.com/photo-1472214103451-9374bd1c798e?auto=format&fit=crop&w=1920&q=80') center/cover fixed;
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .overlay { position: fixed; inset: 0; background: var(--bg-overlay); z-index: -1; backdrop-filter: blur(3px); }
    .container {
      max-width: 950px; width: 100%;
      background: rgba(18, 18, 24, 0.5);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: var(--radius);
      padding: 2rem;
      box-shadow: 0 15px 45px rgba(0,0,0,0.45);
    }
    header { display: flex; flex-wrap: wrap; align-items: baseline; justify-content: space-between; gap: 1rem; margin-bottom: 1.8rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 1rem; }
    h1 { font-size: 1.8rem; font-weight: 600; letter-spacing: -0.5px; }
    .subtitle { color: var(--muted); font-size: 0.9rem; margin-top: 0.2rem; }
    .weather-widget {
      background: var(--card-bg);
      padding: 0.6rem 1rem;
      border-radius: 10px;
      font-size: 0.95rem;
      display: flex; align-items: center; gap: 0.5rem;
      border: 1px solid rgba(255,255,255,0.08);
    }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.1rem; }
    .card {
      background: var(--card-bg);
      border-radius: 14px;
      padding: 1.1rem;
      text-decoration: none;
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.06);
      transition: all 0.25s ease;
      display: flex; flex-direction: column; gap: 0.8rem;
    }
    .card:hover { background: var(--card-hover); transform: translateY(-3px); border-color: var(--accent); }
    .card-header { display: flex; align-items: center; gap: 0.8rem; }
    .icon { font-size: 1.6rem; }
    .card-title { font-size: 1.05rem; font-weight: 600; }
    .card-desc { font-size: 0.78rem; color: var(--muted); margin-top: 0.1rem; }
    .headlines { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.3rem; }
    .headlines li {
      font-size: 0.85rem;
      color: #e5e7eb;
      padding-left: 0.8rem;
      position: relative;
      line-height: 1.4;
      opacity: 0;
      transform: translateY(5px);
      transition: all 0.3s ease;
    }
    .headlines li::before { content: "•"; position: absolute; left: 0; color: var(--accent); }
    .headlines li.loaded { opacity: 1; transform: translateY(0); }
    .loading { color: var(--muted); font-size: 0.8rem; font-style: italic; }
    footer { margin-top: 1.8rem; text-align: center; color: var(--muted); font-size: 0.82rem; opacity: 0.8; border-top: 1px solid rgba(255,255,255,0.08); padding-top: 1rem; }
    @media (max-width: 650px) {
      .container { padding: 1.2rem; }
      h1 { font-size: 1.4rem; }
      header { flex-direction: column; align-items: flex-start; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="container">
    <header>
      <div>
        <h1 id="greeting">👋 Ciao</h1>
        <p class="subtitle">Le tue notizie quotidiane. Senza distrazioni.</p>
      </div>
      <div id="weather" class="weather-widget">🌡️ Meteo Perugia...</div>
    </header>

    <div class="grid" id="news-grid"></div>

    <footer id="date"></footer>
  </div>

  <script>
    // --- 1. CONFIGURAZIONE FONTI ---
    const sources = [
      { name: "Il Post", url: "https://www.ilpost.it/feed/", icon: "📰", desc: "Attualità & Approfondimenti" },
      { name: "ANSA", url: "https://www.ansa.it/sito/notizie/ultime_notizie/ultime_notizie.rss", icon: "🌍", desc: "Ultim'ora & Cronaca" },
      { name: "Wired IT", url: "https://www.wired.it/feed/", icon: "💻", desc: "Tecnologia & Innovazione" },
      { name: "Ubitennis", url: "https://www.ubitennis.com/feed/", icon: "🎾", desc: "Tennis & Sport" },
      { name: "PerugiaToday", url: "https://www.perugiatoday.it/feed/", icon: "🏛️", desc: "Notizie Locali" },
      { name: "Corriere Salute", url: "https://www.corriere.it/rss/salute.xml", icon: "❤️", desc: "Salute & Benessere" }
    ];

    // --- 2. GENERA CARD ---
    const grid = document.getElementById('news-grid');
    sources.forEach((src, i) => {
      const card = document.createElement('a');
      card.href = src.url.replace('/feed/', '').replace('/rss.xml', '').replace('/rss/', '');
      card.target = "_blank"; rel = "noopener";
      card.className = "card";
      card.innerHTML = `
        <div class="card-header">
          <span class="icon">${src.icon}</span>
          <div><div class="card-title">${src.name}</div><div class="card-desc">${src.desc}</div></div>
        </div>
        <ul class="headlines" id="hl-${i}"><li class="loading">⏳ Caricamento titoli...</li></ul>
      `;
      grid.appendChild(card);
      fetchHeadlines(src.url, `hl-${i}`);
    });

    // --- 3. FETCH RSS (via CORS proxy sicuro) ---
    const PROXY = "https://api.allorigins.win/raw?url=";
    async function fetchHeadlines(rssUrl, containerId) {
      try {
        const res = await fetch(PROXY + encodeURIComponent(rssUrl), { signal: AbortSignal.timeout(4000) });
        if (!res.ok) throw new Error("Network");
        const text = await res.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, "text/xml");
        const items = Array.from(doc.querySelectorAll("item")).slice(0, 3);
        const ul = document.getElementById(containerId);
        ul.innerHTML = "";
        if (items.length === 0) throw new Error("No items");
        items.forEach((item, idx) => {
          const li = document.createElement("li");
          li.textContent = item.querySelector("title")?.textContent || "Titolo non disponibile";
          ul.appendChild(li);
          setTimeout(() => li.classList.add("loaded"), idx * 80);
        });
      } catch (e) {
        const ul = document.getElementById(containerId);
        ul.innerHTML = `<li>⚠️ Feed temporaneamente non disponibile. <a href="${rssUrl}" target="_blank" style="color:var(--accent);text-decoration:underline;">Vai alla fonte</a></li>`;
        setTimeout(() => ul.firstElementChild.classList.add("loaded"), 100);
      }
    }

    // --- 4. METEO PERUGIA (Open-Meteo, zero API key) ---
    async function loadWeather() {
      try {
        const res = await fetch("https://api.open-meteo.com/v1/forecast?latitude=43.1107&longitude=12.3908&current=temperature_2m,weather_code,relative_humidity_2m&timezone=Europe/Rome");
        const data = await res.json();
        const { temperature_2m, weather_code, relative_humidity_2m } = data.current;
        const wmo = { 0:"☀️ Sereno", 1:"🌤️ Poco nuvoloso", 2:"⛅ Variabile", 3:"☁️ Nuvoloso", 45:"🌫️ Nebbia", 48:"🌫️ Nebbia brina", 51:"🌦️ Pioggerella", 61:"🌧️ Pioggia", 71:"❄️ Neve", 95:"⛈️ Temporale" };
        const desc = wmo[weather_code] || "🌤️ Variabile";
        document.getElementById("weather").innerHTML = `${desc} • ${Math.round(temperature_2m)}°C • 💧 ${relative_humidity_2m}%`;
      } catch { document.getElementById("weather").textContent = "🌡️ Meteo non disponibile"; }
    }
    loadWeather();

    // --- 5. SALUTO + DATA ---
    const h = new Date().getHours();
    document.getElementById('greeting').textContent = h < 6 ? '🌙 Buonanotte' : h < 12 ? '☀️ Buongiorno' : h < 18 ? '🌤️ Buon pomeriggio' : '🌅 Buonasera';
    document.getElementById('date').textContent = 'Aggiornato al ' + new Date().toLocaleDateString('it-IT', { day:'numeric', month:'long', year:'numeric' });
  </script>
</body>
</html>
